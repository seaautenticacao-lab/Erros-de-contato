<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cloud - Erros de Campo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <nav class="bg-blue-900 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic uppercase tracking-wider">Field Operations | Gestão de Erros</h1>
            <span id="status" class="text-xs bg-yellow-500 px-2 py-1 rounded text-blue-900 font-bold">CONECTANDO...</span>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-6">
        
        <div class="bg-white p-6 rounded-lg shadow-md mb-6 border-t-4 border-blue-600">
            <h2 class="text-sm font-bold mb-4 text-gray-500 uppercase">Novo Registro de Campo</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase">Técnico Responsável</label>
                    <select id="tecnico" class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="">-- Selecione o Nome --</option>
                        <option>ANDERSON SOARES DE ARRUDA</option>
                        <option>IVANILSON SILVA PAIXAO</option>
                        <option>ODAIR JOSE GARCIA FERREIRA</option>
                        <option>LUIZ HENRIQUE FERREIRA MARTINS</option>
                        <option>WELBER JOHN DA SILVA</option>
                        <option>CLEYSON FRANK SILVA E SILVA</option>
                        <option>MANOEL NAZARENO MARQUES DA LUZ</option>
                        <option>MAURICIO COSTA DA SILVA</option>
                        <option>WILLIAMES DOUGLAS NASCIMENTO DA SILVA</option>
                        <option>ADAILTON FONSECA DA SILVA</option>
                        <option>GABRIEL DE SOUSA PEREIRA</option>
                        <option>GEOVENE MELO TORRES</option>
                        <option>IAN JUNIOR ALMEIDA DA SILVA</option>
                        <option>JADSON SANTANA DA COSTA</option>
                        <option>JAILTON DA SILVA MARTINS</option>
                        <option>JOAO BATISTA DE ARAUJO SARAIVA</option>
                        <option>PEDRO HENRIQUE FERREIRA MARTINS</option>
                        <option>RENATO BARATA NATIVIDADE</option>
                        <option>RONALDO LIMA DE MELO</option>
                        <option>SILVIO ROBERTO DA CONCEIÇÃO COSTA</option>
                        <option>HERALDO DA SILVA LIMA</option>
                        <option>MARCOS CELSO SANTOS COUTINHO</option>
                        <option>LUCAS DE LIMA ANDRADE</option>
                        <option>WESLEY PEREIRA DOS SANTOS</option>
                        <option>DAVID FERNANDES DOS SANTOS ARAUJO</option>
                        <option>DELIEL SANDERLAN OLIVEIRA FERREIRA</option>
                        <option>FRANSUEL DIAS DAS MERCES</option>
                        <option>JONATHAN GOMES DE OLIVEIRA</option>
                        <option>WILKER GERALDO DE MIRANDA SOARES II</option>
                        <option>WELINGTON PINHEIRO DE SOUSA</option>
                        <option>IGOR TAVARES GOMES</option>
                        <option>JORGE SEBASTIAO DA SILVA SANTOS</option>
                        <option>JOSE HUMBERTO PEREIRA DOS REIS</option>
                        <option>JOSÉ MARCOS CORDEIRO LOPES</option>
                        <option>ESLON MORAES PEREIRA</option>
                        <option>LUIS FELIPE TRINDADE SIQUEIRA</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase">Tipo de Erro</label>
                    <select id="tipoErro" class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option>Contato que não chama</option>
                        <option>Contato errado (Outra pessoa)</option>
                        <option>Contato sem WhatsApp</option>
                        <option>Contato inexistente</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="btnRegistrar" onclick="adicionarErro()" class="w-full bg-blue-600 hover:bg-blue-800 text-white font-bold py-2 px-4 rounded transition duration-200 uppercase text-sm disabled:bg-gray-400">
                        Registrar e Salvar
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white rounded-lg shadow-md border border-gray-200 overflow-hidden">
                <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                    <h2 class="font-bold text-gray-700 uppercase text-xs">Histórico Sincronizado</h2>
                    <span id="totalContador" class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Total: 0</span>
                </div>
                <div class="overflow-y-auto max-h-[500px]">
                    <table class="w-full text-left">
                        <thead class="bg-gray-100 text-gray-600 text-[10px] uppercase">
                            <tr>
                                <th class="p-4">Técnico</th>
                                <th class="p-4">Erro</th>
                                <th class="p-4">Data/Hora</th>
                                <th class="p-4 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaCorpo" class="text-sm divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
                <h2 class="font-bold text-gray-700 mb-6 text-center uppercase text-sm">Resumo Geral</h2>
                <div class="relative h-[300px]">
                    <canvas id="meuGrafico"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        const BIN_ID = '69baf6dbaa77b81da9f842bf';
        const MASTER_KEY = '$2a$10$OCvV0EQunKhQKKTZBhUQ/.//aQrFwn6qeIzDL2qBCrX1jLMcKCDcy';
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let registrosAtuais = [];
        let grafico;

        async function carregarDados() {
            try {
                const res = await fetch(`${API_URL}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const data = await res.json();
                registrosAtuais = data.record.relatorio_erros || [];
                atualizarInterface();
                setStatus('ONLINE', 'bg-green-500');
            } catch (err) {
                setStatus('ERRO DE CONEXÃO', 'bg-red-500');
            }
        }

        function setStatus(texto, classe) {
            const el = document.getElementById('status');
            el.innerText = texto;
            el.className = `text-xs px-2 py-1 rounded text-white font-bold ${classe}`;
        }

        function atualizarInterface() {
            const tabela = document.getElementById('tabelaCorpo');
            tabela.innerHTML = '';
            
            let contagem = {
                "Contato que não chama": 0,
                "Contato errado (Outra pessoa)": 0,
                "Contato sem WhatsApp": 0,
                "Contato inexistente": 0
            };

            // Inverte para mostrar os novos primeiro
            [...registrosAtuais].reverse().forEach((reg, index) => {
                // O index real no array original (precisamos dele para apagar)
                const realIndex = registrosAtuais.length - 1 - index;
                
                const row = tabela.insertRow();
                row.innerHTML = `
                    <td class="p-4 font-semibold text-gray-700">${reg.tecnico}</td>
                    <td class="p-4"><span class="text-[10px] font-bold px-2 py-1 rounded bg-blue-50 text-blue-700 uppercase">${reg.erro}</span></td>
                    <td class="p-4 text-xs text-gray-400 font-mono">${reg.data} ${reg.hora}</td>
                    <td class="p-4 text-center">
                        <button onclick="apagarRegistro(${realIndex})" class="text-red-400 hover:text-red-600 transition">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                if(contagem[reg.erro] !== undefined) contagem[reg.erro]++;
            });

            document.getElementById('totalContador').innerText = `Total: ${registrosAtuais.length}`;
            updateChart(contagem);
        }

        function updateChart(contagem) {
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            if (grafico) grafico.destroy();
            grafico = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(contagem),
                    datasets: [{
                        data: Object.values(contagem),
                        backgroundColor: ['#eab308', '#ef4444', '#22c55e', '#3f3f46'],
                        borderWidth: 0
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        }

        async function adicionarErro() {
            const tecnico = document.getElementById('tecnico').value;
            const erro = document.getElementById('tipoErro').value;
            if (!tecnico) return alert("Selecione um técnico!");

            const btn = document.getElementById('btnRegistrar');
            btn.disabled = true;

            const novoRegistro = {
                tecnico,
                erro,
                data: new Date().toLocaleDateString('pt-BR'),
                hora: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})
            };

            const novosDados = { relatorio_erros: [...registrosAtuais, novoRegistro] };
            await salvarNoCloud(novosDados);
            
            registrosAtuais.push(novoRegistro);
            atualizarInterface();
            btn.disabled = false;
        }

        async function apagarRegistro(index) {
            if (!confirm("Tem certeza que deseja excluir este registro?")) return;

            // Remove o item do array local
            const novosRegistros = [...registrosAtuais];
            novosRegistros.splice(index, 1);

            const novosDados = { relatorio_erros: novosRegistros };

            setStatus('SALVANDO...', 'bg-yellow-500');
            const sucesso = await salvarNoCloud(novosDados);
            
            if (sucesso) {
                registrosAtuais = novosRegistros;
                atualizarInterface();
                setStatus('ONLINE', 'bg-green-500');
            } else {
                alert("Erro ao apagar registro.");
                setStatus('ERRO', 'bg-red-500');
            }
        }

        async function salvarNoCloud(objetoDados) {
            try {
                const res = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY
                    },
                    body: JSON.stringify(objetoDados)
                });
                return res.ok;
            } catch (err) {
                console.error(err);
                return false;
            }
        }

        carregarDados();
    </script>
</body>
</html>
