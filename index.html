<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cloud - Erros de Campo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <nav class="bg-blue-900 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-satellite-dish text-blue-400"></i>
                <h1 class="text-lg font-bold italic uppercase tracking-wider">Field Operations | Gestão de Erros</h1>
            </div>
            <span id="status" class="text-[10px] bg-yellow-500 px-3 py-1 rounded-full text-blue-900 font-bold transition-all">CONECTANDO...</span>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-6">
        
        <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border-t-4 border-blue-600">
            <h2 class="text-xs font-bold mb-4 text-gray-500 uppercase tracking-widest">Novo Registro de Campo</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Técnico Responsável</label>
                    <select id="tecnico" class="w-full p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 text-sm">
                        <option value="">-- Selecione o Nome --</option>
                        <option>ANDERSON SOARES DE ARRUDA</option>
                        <option>IVANILSON SILVA PAIXAO</option>
                        <option>ODAIR JOSE GARCIA FERREIRA</option>
                        <option>LUIZ HENRIQUE FERREIRA MARTINS</option>
                        <option>WELBER JOHN DA SILVA</option>
                        <option>CLEYSON FRANK SILVA E SILVA</option>
                        <option>MANOEL NAZARENO MARQUES DA LUZ</option>
                        <option>MAURICIO COSTA DA SILVA</option>
                        <option>WILLIAMES DOUGLAS NASCIMENTO DA SILVA</option>
                        <option>ADAILTON FONSECA DA SILVA</option>
                        <option>GABRIEL DE SOUSA PEREIRA</option>
                        <option>GEOVENE MELO TORRES</option>
                        <option>IAN JUNIOR ALMEIDA DA SILVA</option>
                        <option>JADSON SANTANA DA COSTA</option>
                        <option>JAILTON DA SILVA MARTINS</option>
                        <option>JOAO BATISTA DE ARAUJO SARAIVA</option>
                        <option>PEDRO HENRIQUE FERREIRA MARTINS</option>
                        <option>RENATO BARATA NATIVIDADE</option>
                        <option>RONALDO LIMA DE MELO</option>
                        <option>SILVIO ROBERTO DA CONCEIÇÃO COSTA</option>
                        <option>HERALDO DA SILVA LIMA</option>
                        <option>MARCOS CELSO SANTOS COUTINHO</option>
                        <option>LUCAS DE LIMA ANDRADE</option>
                        <option>WESLEY PEREIRA DOS SANTOS</option>
                        <option>DAVID FERNANDES DOS SANTOS ARAUJO</option>
                        <option>DELIEL SANDERLAN OLIVEIRA FERREIRA</option>
                        <option>FRANSUEL DIAS DAS MERCES</option>
                        <option>JONATHAN GOMES DE OLIVEIRA</option>
                        <option>WILKER GERALDO DE MIRANDA SOARES II</option>
                        <option>WELINGTON PINHEIRO DE SOUSA</option>
                        <option>IGOR TAVARES GOMES</option>
                        <option>JORGE SEBASTIAO DA SILVA SANTOS</option>
                        <option>JOSE HUMBERTO PEREIRA DOS REIS</option>
                        <option>JOSÉ MARCOS CORDEIRO LOPES</option>
                        <option>ESLON MORAES PEREIRA</option>
                        <option>LUIS FELIPE TRINDADE SIQUEIRA</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Tipo de Erro</label>
                    <select id="tipoErro" class="w-full p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 text-sm">
                        <option>Contato que não chama</option>
                        <option>Contato errado (Outra pessoa)</option>
                        <option>Contato sem WhatsApp</option>
                        <option>Contato inexistente</option>
                        <option>Contato do Connect diferente do Pipeelo</option>
                        <option>Contato não atende e não tem WhatsApp</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="btnRegistrar" onclick="adicionarErro()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg transition duration-200 uppercase text-sm flex items-center justify-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Registrar e Salvar
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-4 border-b bg-gray-50 flex flex-col md:flex-row justify-between items-center gap-4">
                    <h2 class="font-bold text-gray-700 uppercase text-xs tracking-tighter">Histórico Sincronizado</h2>
                    <div class="relative w-full md:w-64">
                        <input type="text" id="busca" onkeyup="filtrarTabela()" placeholder="Filtrar técnico..." class="w-full pl-9 pr-4 py-1.5 text-xs border rounded-full outline-none focus:ring-2 focus:ring-blue-400">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400 text-[10px]"></i>
                    </div>
                    <span id="totalContador" class="bg-blue-100 text-blue-800 text-[10px] font-black px-3 py-1 rounded-full uppercase">Total: 0</span>
                </div>
                <div class="overflow-y-auto max-h-[500px] custom-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 text-gray-500 text-[10px] uppercase sticky top-0 shadow-sm">
                            <tr>
                                <th class="p-4 font-bold">Técnico</th>
                                <th class="p-4 font-bold">Erro Detectado</th>
                                <th class="p-4 font-bold">Data/Hora</th>
                                <th class="p-4 text-center font-bold">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaCorpo" class="text-sm divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col">
                <h2 class="font-bold text-gray-700 mb-6 text-center uppercase text-xs tracking-widest">Resumo Estatístico</h2>
                <div class="relative flex-grow min-h-[300px]">
                    <canvas id="meuGrafico"></canvas>
                </div>
                <div class="mt-4 pt-4 border-t border-gray-100 text-[10px] text-gray-400 text-center">
                    Dados atualizados em tempo real via Cloud
                </div>
            </div>
        </div>
    </main>

    <script>
        const BIN_ID = '69baf6dbaa77b81da9f842bf';
        const MASTER_KEY = '$2a$10$OCvV0EQunKhQKKTZBhUQ/.//aQrFwn6qeIzDL2qBCrX1jLMcKCDcy';
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let registrosAtuais = [];
        let grafico;

        function setStatus(texto, classe) {
            const el = document.getElementById('status');
            el.innerText = texto;
            el.className = `text-[10px] px-3 py-1 rounded-full text-white font-bold transition-all ${classe}`;
        }

        function filtrarTabela() {
            const termo = document.getElementById('busca').value.toLowerCase();
            const linhas = document.querySelectorAll('#tabelaCorpo tr');
            linhas.forEach(linha => {
                const nome = linha.cells[0].innerText.toLowerCase();
                linha.style.display = nome.includes(termo) ? '' : 'none';
            });
        }

        async function carregarDados() {
            try {
                const res = await fetch(`${API_URL}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const data = await res.json();
                registrosAtuais = data.record.relatorio_erros || [];
                atualizarInterface();
                setStatus('SINC. ONLINE', 'bg-green-500');
            } catch (err) {
                setStatus('ERRO DE NUVEM', 'bg-red-500');
            }
        }

        async function salvarNoCloud(dados) {
            try {
                const res = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY
                    },
                    body: JSON.stringify({ relatorio_erros: dados })
                });
                return res.ok;
            } catch (err) {
                return false;
            }
        }

        async function adicionarErro() {
            const tecnico = document.getElementById('tecnico').value;
            const erro = document.getElementById('tipoErro').value;
            const btn = document.getElementById('btnRegistrar');

            if (!tecnico) return alert("Selecione um técnico!");

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> SALVANDO...';
            setStatus('ENVIANDO...', 'bg-yellow-500');

            const novoRegistro = {
                tecnico,
                erro,
                data: new Date().toLocaleDateString('pt-BR'),
                hora: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})
            };

            const novosDados = [...registrosAtuais, novoRegistro];
            const sucesso = await salvarNoCloud(novosDados);

            if (sucesso) {
                registrosAtuais = novosDados;
                document.getElementById('tecnico').value = "";
                atualizarInterface();
                setStatus('SINC. ONLINE', 'bg-green-500');
            } else {
                alert("Erro ao salvar dados.");
                setStatus('ERRO', 'bg-red-500');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Registrar e Salvar';
        }

        async function apagarRegistro(index) {
            if (!confirm("Deseja realmente excluir este registro?")) return;

            setStatus('EXCLUINDO...', 'bg-orange-500');
            const novosDados = [...registrosAtuais];
            novosDados.splice(index, 1);

            if (await salvarNoCloud(novosDados)) {
                registrosAtuais = novosDados;
                atualizarInterface();
                setStatus('SINC. ONLINE', 'bg-green-500');
            }
        }

        function atualizarInterface() {
            const tabela = document.getElementById('tabelaCorpo');
            tabela.innerHTML = '';
            
            const contagem = {
                "Contato que não chama": 0,
                "Contato errado (Outra pessoa)": 0,
                "Contato sem WhatsApp": 0,
                "Contato inexistente": 0,
                "Contato do Connect diferente do Pipeelo": 0,
                "Contato não atende e não tem WhatsApp": 0
            };

            [...registrosAtuais].reverse().forEach((reg, index) => {
                const realIndex = registrosAtuais.length - 1 - index;
                const row = tabela.insertRow();
                row.className = "hover:bg-blue-50/30 transition-colors";
                row.innerHTML = `
                    <td class="p-4 font-semibold text-gray-700 text-xs">${reg.tecnico}</td>
                    <td class="p-4"><span class="text-[9px] font-bold px-2 py-1 rounded bg-white border border-gray-200 text-gray-600 uppercase shadow-sm">${reg.erro}</span></td>
                    <td class="p-4 text-[10px] text-gray-400 font-mono">${reg.data} ${reg.hora}</td>
                    <td class="p-4 text-center">
                        <button onclick="apagarRegistro(${realIndex})" class="text-gray-300 hover:text-red-500 transition-colors">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                if(contagem[reg.erro] !== undefined) contagem[reg.erro]++;
            });

            document.getElementById('totalContador').innerText = `Total: ${registrosAtuais.length}`;
            updateChart(contagem);
        }

        function updateChart(contagem) {
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            if (grafico) grafico.destroy();
            grafico = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(contagem),
                    datasets: [{
                        data: Object.values(contagem),
                        backgroundColor: [
                            '#eab308', // Amarelo
                            '#ef4444', // Vermelho
                            '#22c55e', // Verde
                            '#64748b', // Cinza
                            '#a855f7', // Roxo
                            '#ec4899'  // Rosa (Novo Erro)
                        ],
                        borderWidth: 4,
                        borderColor: '#ffffff',
                        hoverOffset: 10
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    cutout: '65%',
                    plugins: { 
                        legend: { 
                            position: 'bottom',
                            labels: {
                                padding: 15,
                                boxWidth: 10,
                                font: { size: 9, weight: '600' }
                            }
                        } 
                    } 
                }
            });
        }

        carregarDados();
    </script>
</body>
</html>
